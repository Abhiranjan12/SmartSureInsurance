<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>SmartSure</h1>
      <p>Insurance Management System</p>
    </div>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div *ngIf="message && step === 'otp'" class="alert alert-info">{{ message }}</div>

    <form *ngIf="step === 'login'" (ngSubmit)="onLogin()">
      <h2>Login</h2>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Sending OTP...' : 'Login' }}
      </button>
      <p class="auth-link">Don't have an account? <a routerLink="/register">Register</a></p>
    </form>

    <form *ngIf="step === 'otp'" (ngSubmit)="onVerifyOtp()">
      <h2>Verify OTP</h2>
      <p class="otp-hint">Enter the 6-digit OTP sent to <strong>{{ email }}</strong></p>
      <div class="form-group">
        <label>OTP Code</label>
        <input type="text" [(ngModel)]="otpCode" name="otpCode" placeholder="Enter 6-digit OTP" maxlength="6" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Verifying...' : 'Verify & Login' }}
      </button>
      <button type="button" class="btn-secondary" (click)="step = 'login'">Back</button>
    </form>
  </div>
</div>
