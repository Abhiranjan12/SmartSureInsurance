<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>SmartSure</h1>
      <p>Insurance Management System</p>
    </div>

    <div *ngIf="error" class="alert alert-error">{{ error }}</div>
    <div *ngIf="success" class="alert alert-success">{{ success }} Redirecting to login...</div>

    <form (ngSubmit)="onRegister()">
      <h2>Create Account</h2>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="Enter your full name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Min 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" [(ngModel)]="age" name="age" placeholder="Your age" min="18" max="100" required />
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Register' }}
      </button>
      <p class="auth-link">Already have an account? <a routerLink="/login">Login</a></p>
    </form>
  </div>
</div>
